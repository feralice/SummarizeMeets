<main class="container">
  <section class="hero">
    <h1>Simplifique suas reunioes</h1>
    <p>Envie um video e receba um resumo em minutos</p>
  </section>

  <app-file-uploader
    (fileSelected)="onFileSelected($event)"
    (generateSummary)="onGenerateSummary()"
    [isProcessing]="isSubmitting"
  ></app-file-uploader>

  <div *ngIf="backgroundMessage" class="info-box">
    <h3>Processamento em background</h3>
    <p>{{ backgroundMessage }}</p>
  </div>

  <div *ngIf="error" class="error-box">
    <h3>Erro</h3>
    <p>{{ error }}</p>
  </div>

  <app-queue-list [items]="queue" (viewResult)="onViewResult($event)"></app-queue-list>
</main>
