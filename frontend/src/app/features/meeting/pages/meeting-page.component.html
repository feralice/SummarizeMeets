<main class="container">
  <section class="hero">
    <h1>Simplifique suas reuniões</h1>
    <p>Envie um vídeo e receba um resumo em minutos</p>
  </section>

  <app-file-uploader
    (fileSelected)="onFileSelected($event)"
    (generateSummary)="onGenerateSummary()"
    [isProcessing]="isSubmitting"
  ></app-file-uploader>

  <div *ngIf="error" class="error-box">
    <h3>Erro</h3>
    <p>{{ error }}</p>
  </div>

  <app-queue-list
    [items]="queue"
    (viewResult)="onViewResult($event)"
  ></app-queue-list>
</main>
